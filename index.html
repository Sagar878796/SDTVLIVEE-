<!DOCTYPE html>  <html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>SD TV LIVE</title>  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">  
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>  <style>  
/* Body Background */  
body {  
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);  
    color: #ffffff;  
    margin:0;  
    padding:0;  
    font-family: system-ui;  
}  
  
/* Header */  
header {  
    background: #000;  
    padding: 10px 15px;  
    display: flex;  
    justify-content: space-between;  
    align-items: center;  
    border-bottom: 3px solid #ff9800;  
}  
  
.logo-text {  
  font-family: 'Arial Black', sans-serif;  
  font-size: 20px;  
  font-weight: 900;  
  display: flex;  
}  
.logo-prt { color: #ff0000; }  
.logo-stream { color: #ffcc00; }  
  
.header-right {  
  display: flex;  
  align-items: center;  
  gap: 12px;  
}  
  
.nav-icon {  
  width: 34px;  
  height: 34px;  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  border-radius: 50%;  
  cursor: pointer;  
  color: white;  
  text-decoration: none;  
}  
  
.search-circle { background: #ff0000; }  
.profile-square { background: #00ff08; border-radius: 8px; }  
.menu-circle { background: #333; }  
  
#search-bar {  
  display: none;   
  width: 90%;  
  margin: 10px auto;  
  padding: 8px;  
  border-radius: 5px;  
}  
  
/* ===== Container ===== */  
#container{  
  display: flex;  
  flex-direction: column;  
  height: 100vh;  
  padding: 10px 16px;  
  box-sizing: border-box;  
}  
  
/* ===== Video Frame ===== */  
.shaka-video-container {  
  position: relative;  
  width: 100%;  
  height: 400px; /* Chhota video frame */  
  background: #000;  
  overflow: hidden;  
  border-radius: 6px;  
}  
  
.shaka-video-container video {  
  width: 100%;  
  height: 100%;  
  object-fit: contain;  
  background: #000;  
}  
  
  
}  
  
.shaka-video-container:fullscreen,  
.shaka-video-container:-webkit-full-screen {  
    width: auto !important;  
    height: auto !important;  
    display: block;  
    background: #000;  
}  
}  
.shaka-video-container:-webkit-full-screen {  
    width: auto;  
    height: auto;  
    display: block;  
    background: #000;  
}  
  
/* ===== Buttons Panel ===== */  
.filter-buttons {  
  display: flex;  
  gap: 8px;  
  margin: 10px 0;  
  flex-wrap: nowrap;  
  overflow-x: auto;  
  padding-bottom: 5px;  
  -webkit-overflow-scrolling: touch;  
}  
.filter-buttons::-webkit-scrollbar { display: none; }  
  
.filter-btn, .fav-btn, .my-btn, .stream-btn {  
  display: inline-block;  
  padding: 6px 14px;  
  border-radius: 20px;  
  border: 2px solid #e60000;  
  background: #e60000;  
  color: #fff;  
  font-size: 14px;  
  text-align: center;  
  transition: all 0.2s;  
  white-space: nowrap;  
  flex-shrink: 0;  
}  
.filter-btn:hover, .fav-btn:hover, .my-btn:hover, .stream-btn:hover { background: rgba(230,0,0,0.2); }  
.filter-btn.active, .fav-btn.active, .my-btn.active, .stream-btn.active { background: #e60000; color: #fff; }  
  
/* ===== Grid ===== */  
#grid{  
  flex:1;  
  overflow-y:auto;  
  display:grid;  
  grid-template-columns:repeat(3,1fr);  
  gap:6px;  
  padding:6px;  
  background:#111111;  
}  
.item{  
  background:#1c1c1c;  
  padding:6px;  
  border-radius:6px;  
  text-align:center;  
  cursor:pointer;  
}  
.item img{  
  width:60px;  
  height:60px;  
  object-fit:contain;  
}  
.item div{  
  font-size:12px;  
  margin-top:4px;  
}  
/* Spinner aur blinking load remove karne ke liye */  
.shaka-spinner-container,  
.shaka-play-pause-button[aria-label="buffering"] {  
    display: none !important;  
    animation: none !important;  
    border: none !important;  
}  
#output{ display:none; }  
</style>  </head>  <body>  
<header>  
  <div class="logo-text"><span class="logo-prt">SD TV</span><span class="logo-stream">LIVE</span></div>  
  <div class="header-right">  
    <div class="nav-icon search-circle" onclick="toggleSearch()">🔍</div>  
    <a href="" class="nav-icon profile-square" target="_blank">👤</a>  
    <div class="nav-icon menu-circle">☰</div>  
  </div>  
</header>  <input type="text" id="search-bar" placeholder="Search channels...">  <div id="container">  
  <div class="shaka-video-container" data-shaka-player>  
    <video autoplay playsinline preload="metadata" poster=""></video>  
  </div>    <div id="iframeContainer" style="display:none; width:100%; height:200px; margin-bottom:10px;">  
    <iframe id="contentFrame" src="" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>  
  </div>    <div class="filter-buttons">  
    <a href="#" class="my-btn" id="indNzBtn">Wpl Hindi</a>  
    <a href="#" class="filter-btn">WPL NS</a>  
    <a href="#" class="fav-btn active" id="allBtn">All</a>  
    <a href="https://raw.githubusercontent.com/Prtstream820894/prtstreams/refs/heads/main/mx.m3u" class="fav-btn" id="moviesBtn">Movies</a>  
    <a href="#" class="fav-btn" id="musicBtn">Music</a>  
    <a href="#" class="fav-btn" id="sportsBtn">Sports</a>  
  </div>    <div id="grid"></div>  
</div>  <div id="output">Click any channel to see MPD / Cookie / Key</div>  <script>  
// ===== Toggle Search =====  
function toggleSearch() {  
  const sb = document.getElementById('search-bar');  
  sb.style.display = sb.style.display === 'block' ? 'none' : 'block';  
  if(sb.style.display==='block') sb.focus();  
}  
  
// ===== Shaka Player =====  
const M3U_URL = "https://raw.githubusercontent.com/Prtstream820894/prtstreams/refs/heads/main/ptt.m3u";  
const grid = document.getElementById("grid");  
const searchBar = document.getElementById("search-bar");  
let player, video, drmConfig, cookieHeader, streamUrl;  
let posterTimer = null;  
const POSTER_URL = "H-Lfih2hxizGpp8_pdAwA/s16000/1000149859.gif";  
let allChannels = [];  
  
document.addEventListener('DOMContentLoaded', async () => {  
  shaka.polyfill.installAll();  
  video = document.querySelector('video');  
  player = new shaka.Player();  
  await player.attach(video);  
  
  const container = document.querySelector('.shaka-video-container');  
  const ui = new shaka.ui.Overlay(player, container, video);  
  
  ui.configure({ controlPanelElements:['play_pause','time_and_duration','spacer','mute','volume','quality','picture_in_picture','fullscreen'] });  
  
  player.addEventListener('buffering', (event) => {  
    const playButton = document.querySelector('.shaka-play-pause-button');  
    playButton.style.opacity = event.buffering ? "0.5" : "1";  
    playButton.style.border = event.buffering ? "2px solid #00f7ff" : "none";  
  });  
  
  player.getNetworkingEngine().registerRequestFilter((type, request) => {  
    request.headers['Referer'] = 'https://www.jiotv.com/';  
    request.headers['Origin'] = 'https://www.jiotv.com';  
    request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";  
    if(cookieHeader) request.headers['Cookie'] = cookieHeader;  
    if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST ||  
       type===shaka.net.NetworkingEngine.RequestType.SEGMENT) && cookieHeader && !request.uris[0].includes('__hdnea__=')) {  
      const sep = request.uris[0].includes('?') ? '&' : '?';  
      request.uris[0] += sep + cookieHeader;  
    }  
  });  
  
  const res = await fetch(M3U_URL);  
  const text = await res.text();  
  const lines = text.split("\n");  
  let current = {}, autoPlayChannel = null;  
  
  for(let i=0;i<lines.length;i++){  
    const line = lines[i].trim();  
    if(line.startsWith("#EXTINF")){  
      current={};  
      current.name = line.split(",").pop();  
      const logo = line.match(/tvg-logo="([^"]+)"/);  
      current.logo = logo ? logo[1] : "";  
      const lic = line.match(/license_key="?([a-f0-9]+:[a-f0-9]+)"?/i);  
      current.key = lic ? lic[1] : "-";  
      const ck = line.match(/cookie="?([^"]+)"?/i);  
      current.cookie = ck ? ck[1] : "-";  
    }  
    if(current.key === "-"){  
      for(let j=i+1;j<=i+2 && j<lines.length;j++){  
        const l = lines[j];  
        const k2 = l.match(/license_key="?([a-f0-9]+:[a-f0-9]+)"?/i);  
        if(k2){ current.key = k2[1]; break; }  
      }  
    }  
    if(line.startsWith("#EXTHTTP") && line.includes("cookie")){  
      const ck2 = line.match(/"cookie":"([^"]+)"/);  
      if(ck2) current.cookie = ck2[1];  
    }  
    if(line.startsWith("http") && current.name){  
      current.mpd = line;  
      if(line.includes("keyId=") && line.includes("key=")){  
        const kid = line.match(/keyId=([a-f0-9]+)/i);  
        const key = line.match(/key=([a-f0-9]+)/i);  
        if(kid && key) current.key = kid[1]+":"+key[1];  
      }  
      allChannels.push({...current});  
      createItem(current);  
      if(!autoPlayChannel && current.name.toLowerCase().includes("Star Sports HD1")){  
        autoPlayChannel = {...current};  
      }  
      current={};  
    }  
  }  
  
  if(autoPlayChannel) loadChannel(autoPlayChannel);  
  
  const buttonChannels = { "WPL NS":"willow","BBL":"Star Sports HD2" };  
  const filterButtons = document.querySelectorAll('.filter-btn');  
  filterButtons.forEach(btn => {  
    btn.addEventListener('click', async (e)=>{  
      e.preventDefault();  
      const btnText = btn.textContent.trim();  
      const channelName = buttonChannels[btnText];  
      if(!channelName) return;  
      const ch = allChannels.find(c => c.name.toLowerCase() === channelName.toLowerCase());  
      if(ch) loadChannel(ch);  
    });  
  });  
});  
  
// ===== Create Grid Item =====  
function createItem(ch){  
  const div = document.createElement("div");  
  div.className="item";  
  div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;  
  div.onclick = async ()=>{ loadChannel(ch); };  
  grid.appendChild(div);  
}  
  
// ===== Load Channel =====  
async function loadChannel(ch){  
  showPlayer();  
  video.poster="";  
  if(posterTimer) clearTimeout(posterTimer);  
  posterTimer = setTimeout(()=>{ if(video.paused || video.readyState<3) video.poster="H-Lfih2hxizGpp8_pdAwA/s16000/1000149859.gif"; },5000);  
  
  streamUrl=ch.mpd;  
  cookieHeader=ch.cookie;  
  drmConfig={clearKeys:{}};  
  if(ch.key && ch.key!="-"){  
    const [kid,key]=ch.key.split(":");  
    drmConfig.clearKeys[kid]=key;  
  }  
  try{ await player.configure({drm:drmConfig}); await player.load(streamUrl); }  
  catch(e){ console.error(e); }  
}  
  
// ===== Search =====  
searchBar.addEventListener("input", ()=>{  
  const searchTerm = searchBar.value.toLowerCase();  
  grid.innerHTML="";  
  allChannels.filter(ch => ch.name.toLowerCase().includes(searchTerm)).forEach(ch => createItem(ch));  
});  
  
// ===== Filters =====  
document.getElementById('sportsBtn').addEventListener('click', e=>{  
  e.preventDefault(); grid.innerHTML=""; allChannels.filter(ch => ch.name.toLowerCase().includes("sport")).forEach(c=>createItem(c));  
  document.querySelectorAll('.filter-btn, .fav-btn, .my-btn').forEach(b=>b.classList.remove('active')); document.getElementById('sportsBtn').classList.add('active');  
});  
document.getElementById('allBtn').addEventListener('click', e=>{  
  e.preventDefault(); grid.innerHTML=""; allChannels.forEach(c=>createItem(c));  
  document.querySelectorAll('.filter-btn, .fav-btn, .my-btn').forEach(b=>b.classList.remove('active')); document.getElementById('allBtn').classList.add('active');  
});  
document.getElementById('moviesBtn').addEventListener('click', e=>{  
  e.preventDefault(); grid.innerHTML=""; allChannels.filter(ch => ch.name.toLowerCase().includes("movie") || ch.name.toLowerCase().includes("cinema") || ch.name.toLowerCase().includes("action")).forEach(c=>createItem(c));  
  document.querySelectorAll('.filter-btn, .fav-btn, .my-btn').forEach(b=>b.classList.remove('active')); document.getElementById('moviesBtn').classList.add('active');  
});  
document.getElementById('musicBtn').addEventListener('click', e=>{  
  e.preventDefault(); grid.innerHTML=""; allChannels.filter(ch => ch.name.toLowerCase().includes("music") || ch.name.toLowerCase().includes("songs") || ch.name.toLowerCase().includes("zing") || ch.name.toLowerCase().includes("mtv")).forEach(c=>createItem(c));  
  document.querySelectorAll('.filter-btn, .fav-btn, .my-btn').forEach(b=>b.classList.remove('active')); document.getElementById('musicBtn').classList.add('active');  
});  
  
// ===== Iframe Logic =====  
const iframeContainer = document.getElementById('iframeContainer');  
const iframe = document.getElementById('contentFrame');  
document.getElementById("indNzBtn").addEventListener("click", e=>{ e.preventDefault(); showIframe("ply.html"); });  
function showIframe(url){ if(video) video.pause(); document.querySelector('.shaka-video-container').style.display="none"; iframeContainer.style.display="block"; iframe.src=url; }  
function showPlayer(){ iframe.src=""; iframeContainer.style.display="none"; document.querySelector('.shaka-video-container').style.display="block"; }  
  
</script>  </body>  
</html>
